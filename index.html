<!DOCTYPE html>
<html>
<head>
  <title>Prototics Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Prototics Lab Tool Management</h1>

<div class="container">

  <!-- STUDENT SECTION -->
  <div class="box">
    <h2>Student Panel</h2>

    <select id="tool">
      <option>Hammer</option>
      <option>Drill Machine</option>
      <option>Spanner</option>
      <option>Screwdriver</option>
      <option>Pliers</option>
      <option>Wrench</option>
      <option>Measuring Tape</option>
      <option>Multimeter</option>
      <option>Soldering Iron</option>
      <option>Hex Key Set</option>
    </select>

    <br><br>

    <button onclick="startCamera('issue')">Scan Face & Issue Tool</button>

    <p id="studentStatus"></p>
  </div>

  <!-- LAB ASSISTANT SECTION -->
  <div class="box">
    <h2>Lab Assistant Panel</h2>

    <input type="text" id="studentName" placeholder="Student Name">
    <input type="text" id="studentId" placeholder="Student ID">

    <br><br>

    <button onclick="startCamera('register')">Register Face</button>

    <p id="assistantStatus"></p>

    <h3>Tools In Use</h3>
    <table id="toolTable">
      <thead>
        <tr>
          <th>Tool</th>
          <th>Student</th>
          <th>Status</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

</div>

<!-- CAMERA -->
<div id="cameraBox" class="hidden">
  <video id="video" autoplay></video>
  <button onclick="capture()">Capture</button>
</div>

<script src="app.js"></script>

</body>
</html>
